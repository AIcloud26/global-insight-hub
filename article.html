<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Global Insight Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        :root { --primary: #2563EB; --text: #111827; --gray: #6B7280; --border: #E5E7EB; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: var(--text); line-height: 1.7; }
        nav { background: #fff; border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .back { color: var(--gray); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
        .back:hover { color: var(--primary); }
        .article { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .header { margin-bottom: 2rem; }
        .tag { display: inline-block; padding: 0.3rem 0.8rem; background: #DBEAFE; color: var(--primary); border-radius: 1rem; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.75rem; }
        h1 { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 1rem; }
        .meta { display: flex; gap: 1.5rem; color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .cover { width: 100%; height: 400px; object-fit: cover; border-radius: 0.75rem; margin-bottom: 2rem; background: #F3F4F6; }
        .content { font-size: 1.1rem; color: #374151; }
        .content h2 { font-size: 1.6rem; font-weight: 700; margin: 2.5rem 0 1rem; }
        .content h3 { font-size: 1.3rem; font-weight: 600; margin: 2rem 0 0.75rem; }
        .content p { margin-bottom: 1.25rem; }
        .content ul, .content ol { margin: 1rem 0 1rem 2rem; }
        .content li { margin-bottom: 0.5rem; }
        .content blockquote { border-left: 4px solid var(--primary); padding-left: 1rem; margin: 1.5rem 0; color: var(--gray); font-style: italic; }
        .content code { background: #F3F4F6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.95em; }
        .content pre { background: #111827; color: #E5E7EB; padding: 1.25rem; border-radius: 0.5rem; overflow-x: auto; margin: 1.5rem 0; }
        .loading, .error { text-align: center; padding: 4rem 2rem; color: var(--gray); }
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .cover { height: 220px; }
            .article { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">Global Insight Hub</a>
            <a href="index.html" class="back">← Back to Home</a>
        </div>
    </nav>

    <article class="article" id="articleBox">
        <div class="loading">📖 Loading article...</div>
    </article>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const box = document.getElementById('articleBox');

        async function load() {
            if (!id) { box.innerHTML = '<div class="error">❌ Missing article ID</div>'; return; }
            try {
                const res = await fetch('posts.json');
                const posts = await res.json();
                const post = posts.find(p => p.id === id);
                if (!post) { box.innerHTML = '<div class="error">❌ Article not found</div>'; return; }

                const html = DOMPurify.sanitize(marked.parse(post.content));
                box.innerHTML = `
                    <div class="header">
                        <span class="tag">${post.category}</span>
                        <h1>${post.title}</h1>
                        <div class="meta">
                            <span>📅 ${post.date}</span>
                            <span>✍️ ${post.author || 'Editor'}</span>
                            <span>⏱️ ${post.readTime || '5 min'}</span>
                        </div>
                    </div>
                    <img src="${post.image}" alt="${post.title}" class="cover" loading="lazy" onerror="this.src='https://via.placeholder.com/800x400?text=Cover+Image'">
                    <div class="content">${html}</div>
                `;
                document.title = `${post.title} - Global Insight Hub`;
            } catch (e) {
                box.innerHTML = `<div class="error">❌ Load failed<br><small>${e.message}</small></div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
