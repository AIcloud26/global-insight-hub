<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Global Insight Hub - Technology, Finance, AI Tools & Lifestyle News">
    <title>Global Insight Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --bg: #FFFFFF; --text: #111827; --gray: #6B7280; --border: #E5E7EB; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        nav { background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 1rem 2rem; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--gray); font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .hero { background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%); color: white; padding: 4rem 2rem; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto 2rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
        .filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filter-btn { padding: 0.5rem 1.2rem; border: 1px solid var(--border); background: white; border-radius: 2rem; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2rem; }
        .card { background: white; border: 1px solid var(--border); border-radius: 0.75rem; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #F3F4F6; }
        .card-body { padding: 1.5rem; }
        .tag { display: inline-block; padding: 0.25rem 0.7rem; background: #DBEAFE; color: var(--primary); border-radius: 1rem; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.75rem; }
        .card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
        .card p { color: var(--gray); font-size: 0.95rem; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: #9CA3AF; }
        .read-more { color: #F59E0B; font-weight: 600; text-decoration: none; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray); }
        footer { background: #F9FAFB; border-top: 1px solid var(--border); padding: 3rem 2rem 2rem; margin-top: 4rem; text-align: center; color: var(--gray); font-size: 0.9rem; }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">Global Insight Hub</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="privacy.html">Privacy</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero">
        <h1>Stay Ahead of the Curve</h1>
        <p>Expert insights on Technology, Finance, AI Tools & Lifestyle. Updated weekly.</p>
    </section>

    <main class="container">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="All">All</button>
            <button class="filter-btn" data-cat="Technology">Technology</button>
            <button class="filter-btn" data-cat="Finance">Finance</button>
            <button class="filter-btn" data-cat="AI Tools">AI Tools</button>
            <button class="filter-btn" data-cat="Health & Lifestyle">Health & Lifestyle</button>
        </div>
        <div class="grid" id="grid">
            <div class="empty-state">📖 Loading articles...</div>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Global Insight Hub. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        const grid = document.getElementById('grid');
        const filters = document.querySelectorAll('.filter-btn');
        let allPosts = [];

        async function loadPosts() {
            try {
                const res = await fetch('posts.json');
                if (!res.ok) throw new Error('Network response was not ok');
                allPosts = await res.json();
                renderPosts(allPosts);
            } catch (err) {
                grid.innerHTML = `<div class="empty-state">⚠️ Failed to load articles. Check posts.json format.<br><small>${err.message}</small></div>`;
            }
        }

        function renderPosts(posts) {
            if (!posts.length) {
                grid.innerHTML = '<div class="empty-state">📭 No articles found.</div>';
                return;
            }
            grid.innerHTML = posts.map(p => `
                <article class="card" onclick="location.href='article.html?id=${p.id}'">
                    <img src="${p.image}" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/800x400?text=Global+Insight+Hub'">
                    <div class="card-body">
                        <span class="tag">${p.category}</span>
                        <h2>${p.title}</h2>
                        <p>${p.excerpt}</p>
                        <div class="meta">
                            <span>${p.date}</span>
                            <a href="article.html?id=${p.id}" class="read-more" onclick="event.stopPropagation()">Read →</a>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        filters.forEach(btn => {
            btn.addEventListener('click', () => {
                filters.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const cat = btn.dataset.cat;
                renderPosts(cat === 'All' ? allPosts : allPosts.filter(p => p.category === cat));
            });
        });

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
